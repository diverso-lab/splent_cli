name: Commits Syntax Checker

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

jobs:
  check:
    name: Conventional Commits
    runs-on: ubuntu-24.04

    steps:
      - name: Validate commit messages
        uses: webiny/action-conventional-commits@v1.3.0
